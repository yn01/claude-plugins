orchestrator:
  model: claude-opus-4-6
  role: Orchestrator
  directs: [doc-manager, release-manager, explorer, team-alpha-lead, team-beta-lead]

agents:
  doc-manager:
    model: claude-sonnet-4-6
    type: general-purpose
    role: Documentation Manager
  release-manager:
    model: claude-sonnet-4-6
    type: general-purpose
    role: Release Manager
  explorer:
    model: claude-haiku-4-5-20251001
    type: explore
    role: Explorer
  team-alpha-lead:
    model: claude-sonnet-4-6
    type: general-purpose
    role: Team Alpha Lead
    directs: [implementer-a, reviewer-a, evaluator-a]
  implementer-a:
    model: claude-sonnet-4-6
    type: general-purpose
    role: Implementer A
  reviewer-a:
    type: bash
    role: Reviewer A (Codex CLI)
  evaluator-a:
    model: claude-sonnet-4-6
    type: general-purpose
    role: Evaluator A
  team-beta-lead:
    model: claude-sonnet-4-6
    type: general-purpose
    role: Team Beta Lead
    directs: [implementer-b, reviewer-b, evaluator-b]
  implementer-b:
    model: claude-sonnet-4-6
    type: general-purpose
    role: Implementer B
  reviewer-b:
    type: bash
    role: Reviewer B (Codex CLI)
  evaluator-b:
    model: claude-sonnet-4-6
    type: general-purpose
    role: Evaluator B

message_queue:
  base_path: .claude/messages/inbox

sprint_contracts:
  base_path: .claude/messages/contracts
