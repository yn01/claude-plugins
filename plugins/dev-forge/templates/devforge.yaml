# dev-forge configuration template
# Copy this file to your project root as devforge.yaml

orchestrator:
  model: claude-opus-4-6
  can_contact:
    - team-alpha-lead
    - team-beta-lead
    - doc-manager
    - release-manager
    - explorer

cross_team_agents:
  doc-manager:
    model: claude-sonnet-4-6
    can_contact: [orchestrator, team-alpha-lead, team-beta-lead]
  release-manager:
    model: claude-sonnet-4-6
    can_contact: [orchestrator, team-alpha-lead, team-beta-lead]
  explorer:
    model: claude-haiku-4-5-20251001
    can_contact: [orchestrator, team-alpha-lead, team-beta-lead]

teams:
  - name: alpha
    lead:
      model: claude-sonnet-4-6
      can_contact:
        - orchestrator
        - doc-manager
        - release-manager
        - explorer
        - implementer-alpha
        - evaluator-alpha
        - reviewer-alpha
    members:
      - id: implementer-alpha
        role: implementer
        model: claude-sonnet-4-6
        can_contact: [team-alpha-lead, evaluator-alpha, reviewer-alpha]
      - id: evaluator-alpha
        role: evaluator
        model: claude-sonnet-4-6
        can_contact: [team-alpha-lead, implementer-alpha]
      - id: reviewer-alpha
        role: reviewer
        model: claude-sonnet-4-6
        can_contact: [team-alpha-lead, implementer-alpha]

  - name: beta
    lead:
      model: claude-sonnet-4-6
      can_contact:
        - orchestrator
        - doc-manager
        - release-manager
        - explorer
        - implementer-beta
        - evaluator-beta
        - reviewer-beta
    members:
      - id: implementer-beta
        role: implementer
        model: claude-sonnet-4-6
        can_contact: [team-beta-lead, evaluator-beta, reviewer-beta]
      - id: evaluator-beta
        role: evaluator
        model: claude-sonnet-4-6
        can_contact: [team-beta-lead, implementer-beta]
      - id: reviewer-beta
        role: reviewer
        model: claude-sonnet-4-6
        can_contact: [team-beta-lead, implementer-beta]

model_escalation:
  enabled: true
  on_consecutive_failures:
    2: claude-sonnet-4-6
    4: claude-opus-4-6
  bug_council_trigger: 6

wiki:
  storage: local              # local or obsidian
  obsidian_vault: ""          # set vault path when storage: obsidian
  wiki_folder: .dev-forge/wiki
  learnings_folder: .dev-forge/learnings

agent_templates:
  - security-auditor
  - performance-analyst
  - devops-engineer
  - doc-writer
