# dev-forge configuration template
# Copy this file to your project root as devforge.yaml

model_aliases:
  opus: claude-opus-4-6
  sonnet: claude-sonnet-4-6
  haiku: claude-haiku-4-5-20251001

model_profile: balanced

model_profiles:
  economy:
    orchestrator: sonnet
    project-manager: haiku
    bug-council-orchestrator: sonnet
    default: haiku
  balanced:
    orchestrator: opus
    project-manager: sonnet
    bug-council-orchestrator: opus
    explorer: haiku
    default: sonnet
  quality:
    orchestrator: opus
    project-manager: opus
    bug-council-orchestrator: opus
    explorer: sonnet
    default: opus

orchestrator:
  can_contact:
    - project-manager
    - explorer               # direct exploration requests allowed

project-manager:
  model: claude-sonnet-4-6
  can_contact:
    - orchestrator
    - team-alpha-lead
    - team-beta-lead
    - doc-manager            # PM manages doc-manager
    - release-manager        # PM manages release-manager
    - explorer

cross_team_agents:
  doc-manager:
    model: claude-sonnet-4-6
    can_contact:
      - project-manager      # primary report line
      - team-alpha-lead      # cross-team coordination
      - team-beta-lead
  release-manager:
    model: claude-sonnet-4-6
    can_contact:
      - project-manager      # primary report line
      - orchestrator         # Go/No-Go release approval requests only
      - team-alpha-lead
      - team-beta-lead
  explorer:
    model: claude-haiku-4-5-20251001
    can_contact:
      - orchestrator         # return exploration results
      - project-manager      # return exploration results
      - team-alpha-lead      # return exploration results
      - team-beta-lead       # return exploration results

teams:
  - name: alpha
    lead:
      can_contact:
        - project-manager
        - doc-manager
        - release-manager
        - explorer
        - implementer-alpha
        - evaluator-alpha
        - reviewer-alpha
    members:
      - id: implementer-alpha
        role: implementer
        can_contact: [team-alpha-lead, evaluator-alpha, reviewer-alpha]
      - id: evaluator-alpha
        role: evaluator
        can_contact: [team-alpha-lead, implementer-alpha]
      - id: reviewer-alpha
        role: reviewer
        can_contact: [team-alpha-lead, implementer-alpha]

  - name: beta
    lead:
      can_contact:
        - project-manager
        - doc-manager
        - release-manager
        - explorer
        - implementer-beta
        - evaluator-beta
        - reviewer-beta
    members:
      - id: implementer-beta
        role: implementer
        can_contact: [team-beta-lead, evaluator-beta, reviewer-beta]
      - id: evaluator-beta
        role: evaluator
        can_contact: [team-beta-lead, implementer-beta]
      - id: reviewer-beta
        role: reviewer
        can_contact: [team-beta-lead, implementer-beta]

model_escalation:
  enabled: true
  on_consecutive_failures:
    2: sonnet
    4: opus
  bug_council_trigger: 6

wiki:
  storage: local              # local or obsidian
  obsidian_vault: ""          # set vault path when storage: obsidian
  wiki_folder: .dev-forge/wiki
  learnings_folder: .dev-forge/learnings

agent_templates:
  - security-auditor
  - performance-analyst
  - devops-engineer
  - doc-writer
