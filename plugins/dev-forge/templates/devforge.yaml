# dev-forge configuration template
# Copy this file to your project root as devforge.yaml

model_aliases:
  opus: claude-opus-4-6
  sonnet: claude-sonnet-4-6
  haiku: claude-haiku-4-5-20251001

model_profile: balanced

model_profiles:
  economy:
    orchestrator: sonnet
    bug-council-orchestrator: sonnet
    default: haiku
  balanced:
    orchestrator: opus
    bug-council-orchestrator: opus
    explorer: haiku
    default: sonnet
  quality:
    orchestrator: opus
    bug-council-orchestrator: opus
    explorer: sonnet
    default: opus

orchestrator:
  can_contact:
    - team-alpha-lead
    - team-beta-lead
    - doc-manager
    - release-manager
    - explorer

cross_team_agents:
  doc-manager:
    can_contact: [orchestrator, team-alpha-lead, team-beta-lead]
  release-manager:
    can_contact: [orchestrator, team-alpha-lead, team-beta-lead]
  explorer:
    can_contact: [orchestrator, team-alpha-lead, team-beta-lead]

teams:
  - name: alpha
    lead:
      can_contact:
        - orchestrator
        - doc-manager
        - release-manager
        - explorer
        - implementer-alpha
        - evaluator-alpha
        - reviewer-alpha
    members:
      - id: implementer-alpha
        role: implementer
        can_contact: [team-alpha-lead, evaluator-alpha, reviewer-alpha]
      - id: evaluator-alpha
        role: evaluator
        can_contact: [team-alpha-lead, implementer-alpha]
      - id: reviewer-alpha
        role: reviewer
        can_contact: [team-alpha-lead, implementer-alpha]

  - name: beta
    lead:
      can_contact:
        - orchestrator
        - doc-manager
        - release-manager
        - explorer
        - implementer-beta
        - evaluator-beta
        - reviewer-beta
    members:
      - id: implementer-beta
        role: implementer
        can_contact: [team-beta-lead, evaluator-beta, reviewer-beta]
      - id: evaluator-beta
        role: evaluator
        can_contact: [team-beta-lead, implementer-beta]
      - id: reviewer-beta
        role: reviewer
        can_contact: [team-beta-lead, implementer-beta]

model_escalation:
  enabled: true
  on_consecutive_failures:
    2: sonnet
    4: opus
  bug_council_trigger: 6

wiki:
  storage: local              # local or obsidian
  obsidian_vault: ""          # set vault path when storage: obsidian
  wiki_folder: .dev-forge/wiki
  learnings_folder: .dev-forge/learnings

agent_templates:
  - security-auditor
  - performance-analyst
  - devops-engineer
  - doc-writer
